<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For Her ❤️ A Thousand Apologies</title>
  <!-- Font Awesome for icons (optional but adds a nice touch) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    /* reset & base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      background: #1a0b0b; /* fallback deep red */
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ---- full-screen background image (with overlay for readability) ---- */
    .bg-image {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?w=1200&q=80') no-repeat center center/cover;
      filter: brightness(0.6) saturate(1.1);
      z-index: 0;
    }

    /* subtle animated overlay to give depth */
    .bg-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 50%, rgba(200, 70, 70, 0.15) 0%, rgba(40, 10, 10, 0.6) 100%);
      z-index: 1;
      pointer-events: none;
    }

    /* ---- main content card ---- */
    .apology-card {
      position: relative;
      z-index: 20;
      max-width: 680px;
      width: 90%;
      padding: 2.5rem 2rem;
      background: rgba(20, 5, 5, 0.55);
      backdrop-filter: blur(8px) saturate(180%);
      -webkit-backdrop-filter: blur(8px) saturate(180%);
      border-radius: 48px 16px 48px 16px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 200, 200, 0.2);
      text-align: center;
      border: 1px solid rgba(255, 180, 180, 0.3);
      transition: transform 0.3s ease;
      animation: floatGlow 4s infinite alternate ease-in-out;
    }

    @keyframes floatGlow {
      0% { transform: translateY(0px) scale(1); box-shadow: 0 30px 60px rgba(0,0,0,0.7); }
      100% { transform: translateY(-8px) scale(1.01); box-shadow: 0 40px 80px rgba(200, 50, 50, 0.5); }
    }

    .apology-card h1 {
      font-size: 3.4rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: #ffdddd;
      text-shadow: 0 0 20px rgba(255, 80, 80, 0.8), 0 0 40px rgba(200, 0, 0, 0.3);
      margin-bottom: 0.5rem;
      font-family: 'Georgia', serif;
    }

    .apology-card h1 i {
      color: #ff6b6b;
      margin: 0 6px;
      filter: drop-shadow(0 0 10px #ff3b3b);
    }

    .apology-card .subhead {
      font-size: 1.1rem;
      color: #fccccc;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.9;
      margin-bottom: 1.2rem;
      border-bottom: 1px dashed rgba(255, 150, 150, 0.3);
      padding-bottom: 0.8rem;
    }

    .apology-message {
      font-size: 1.4rem;
      line-height: 1.6;
      color: #fff0f0;
      background: rgba(0, 0, 0, 0.25);
      padding: 1.2rem 1.8rem;
      border-radius: 60px 12px 60px 12px;
      backdrop-filter: blur(2px);
      margin: 1.5rem 0;
      font-weight: 300;
      border-left: 4px solid #ff8a8a;
      border-right: 4px solid #ff8a8a;
      box-shadow: inset 0 0 30px rgba(255, 100, 100, 0.1);
    }

    .apology-message i {
      color: #ffa5a5;
      margin: 0 6px;
    }

    .heart-icon {
      color: #ff3366;
      display: inline-block;
      animation: pulseHeart 1.2s infinite alternate;
    }

    @keyframes pulseHeart {
      0% { transform: scale(1); text-shadow: 0 0 10px #ff3366; }
      100% { transform: scale(1.3); text-shadow: 0 0 30px #ff0044, 0 0 60px #ff0044; }
    }

    .song-control {
      margin: 1.8rem 0 0.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .song-control button {
      background: rgba(255, 220, 220, 0.08);
      border: 1.5px solid rgba(255, 180, 180, 0.5);
      color: #ffe0e0;
      padding: 10px 22px;
      border-radius: 60px;
      font-size: 1rem;
      font-weight: 600;
      backdrop-filter: blur(4px);
      cursor: pointer;
      transition: all 0.25s ease;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      letter-spacing: 1px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    .song-control button i {
      font-size: 1.2rem;
      color: #ff9b9b;
    }

    .song-control button:hover {
      background: rgba(255, 100, 100, 0.25);
      border-color: #ff8a8a;
      transform: scale(1.04);
      box-shadow: 0 0 25px rgba(255, 60, 60, 0.4);
    }

    .song-control button:active {
      transform: scale(0.96);
    }

    .credit {
      margin-top: 1.8rem;
      font-size: 0.8rem;
      color: #dbbbbb;
      opacity: 0.7;
      letter-spacing: 1px;
      border-top: 1px solid rgba(255, 150, 150, 0.2);
      padding-top: 1.2rem;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .credit i {
      color: #ff6f6f;
    }

    /* ---- 3D Heart canvas (insane 3D with hearts) ---- */
    #heart-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 5;
      pointer-events: none; /* so clicks pass to buttons */
    }

    /* small responsive */
    @media (max-width: 480px) {
      .apology-card {
        padding: 1.8rem 1rem;
        width: 94%;
      }
      .apology-card h1 {
        font-size: 2.6rem;
      }
      .apology-message {
        font-size: 1.1rem;
        padding: 1rem 1.2rem;
      }
      .song-control button {
        padding: 8px 16px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>

  <!-- Background image & overlay -->
  <div class="bg-image"></div>
  <div class="bg-overlay"></div>

  <!-- 3D Heart canvas (Three.js) -->
  <canvas id="heart-canvas"></canvas>

  <!-- Main apology card -->
  <div class="apology-card">
    <h1>
      <i class="fas fa-heart heart-icon"></i> 
      I'm Sorry 
      <i class="fas fa-heart heart-icon"></i>
    </h1>
    <div class="subhead">— for every tear, every worry —</div>

    <div class="apology-message">
      <i class="fas fa-quote-left" style="opacity:0.6;"></i>
      My love, I know I messed up. 
      <br />
      <span style="font-weight:300; font-style:italic; color:#ffd0d0;">
        “You are the poetry my heart always wanted to write.”
      </span>
      <br />
      Please forgive me. 
      <i class="fas fa-quote-right" style="opacity:0.6;"></i>
    </div>

    <div class="song-control">
      <button id="playPauseBtn">
        <i class="fas fa-play" id="playIcon"></i> 
        <span id="playLabel">Play song</span>
      </button>
      <button id="restartBtn">
        <i class="fas fa-redo-alt"></i> Restart
      </button>
    </div>

    <div class="credit">
      <span><i class="fas fa-heart" style="color:#ff4d4d;"></i> with all my heart</span>
      <span><i class="fas fa-music"></i> “Apologize” instrumental</span>
    </div>
  </div>

  <!-- Three.js & 3D hearts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    (function() {
      // ----- 3D Heart particles (insane 3D with hearts) -----
      const canvas = document.getElementById('heart-canvas');
      const scene = new THREE.Scene();
      scene.background = null; // transparent

      const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 0, 28);

      const renderer = new THREE.WebGLRenderer({
        canvas: canvas,
        alpha: true,
        antialias: true
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = false; // performance

      // ---- Create heart shape points (3D) ----
      function generateHeartPoints(count = 1800) {
        const points = [];
        // Heart parametric: x = 16 sin^3 t, y = 13cos t - 5 cos 2t - 2 cos 3t - cos 4t 
        // scale and add Z depth with noise
        for (let i = 0; i < count; i++) {
          const t = Math.random() * Math.PI * 2;
          const scale = 0.55 + Math.random() * 0.25; // varied size
          const x = 16 * Math.pow(Math.sin(t), 3) * scale;
          const y = (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * scale;
          // add some Z spread to make it 3D
          const z = (Math.random() - 0.5) * 4.5;
          // also add slight random offset for organic feel
          const offset = 0.15;
          points.push({
            x: x + (Math.random() - 0.5) * offset,
            y: y + (Math.random() - 0.5) * offset,
            z: z + (Math.random() - 0.5) * 0.8
          });
        }
        return points;
      }

      const heartData = generateHeartPoints(2200);
      const positions = [];
      const colors = [];

      heartData.forEach(p => {
        positions.push(p.x, p.y, p.z);
        // colors: gradient from deep red to bright pink / gold
        const r = 0.9 + 0.3 * Math.random();
        const g = 0.1 + 0.3 * Math.random();
        const b = 0.2 + 0.5 * Math.random();
        colors.push(r, g, b);
      });

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

      // Create heart texture (small circle with glow)
      function createHeartTexture() {
        const canvas2 = document.createElement('canvas');
        canvas2.width = 64;
        canvas2.height = 64;
        const ctx = canvas2.getContext('2d');
        const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
        gradient.addColorStop(0, 'rgba(255, 80, 120, 1)');
        gradient.addColorStop(0.3, 'rgba(255, 40, 80, 1)');
        gradient.addColorStop(0.7, 'rgba(200, 20, 40, 0.9)');
        gradient.addColorStop(1, 'rgba(120, 0, 20, 0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 64, 64);
        // tiny heart shape inside? we use circle with glow, but we can draw a small heart
        ctx.font = '28px "Segoe UI", "Arial Unicode MS", sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(255,0,50,0.8)';
        ctx.shadowBlur = 20;
        ctx.fillStyle = 'rgba(255, 200, 200, 0.9)';
        ctx.fillText('♥', 32, 34);
        return new THREE.CanvasTexture(canvas2);
      }

      const particleTexture = createHeartTexture();

      const material = new THREE.PointsMaterial({
        size: 0.45,
        map: particleTexture,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        transparent: true,
        vertexColors: true,
        opacity: 0.95,
        sizeAttenuation: true
      });

      const heartParticles = new THREE.Points(geometry, material);
      scene.add(heartParticles);

      // ---- add extra floating small hearts around (more 3D) ----
      const extraHeartGeo = new THREE.BufferGeometry();
      const extraPositions = [];
      for (let i = 0; i < 400; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.random() * Math.PI * 2;
        const radius = 12 + Math.random() * 10;
        const x = Math.sin(theta) * Math.cos(phi) * radius;
        const y = Math.sin(theta) * Math.sin(phi) * radius * 0.8;
        const z = Math.cos(theta) * radius * 0.6;
        extraPositions.push(x, y, z);
      }
      extraHeartGeo.setAttribute('position', new THREE.Float32BufferAttribute(extraPositions, 3));
      const extraMaterial = new THREE.PointsMaterial({
        size: 0.25,
        color: 0xff6688,
        map: particleTexture,
        blending: THREE.AdditiveBlending,
        transparent: true,
        opacity: 0.4,
        depthWrite: false,
        sizeAttenuation: true
      });
      const extraHearts = new THREE.Points(extraHeartGeo, extraMaterial);
      scene.add(extraHearts);

      // ---- second layer of tiny hearts (3D ring) ----
      const ringGeo = new THREE.BufferGeometry();
      const ringPos = [];
      for (let i = 0; i < 300; i++) {
        const angle = (i / 300) * Math.PI * 2;
        const radius = 9 + Math.sin(i * 0.5) * 2;
        const x = Math.cos(angle) * radius;
        const y = Math.sin(angle) * radius * 0.6;
        const z = Math.sin(angle * 2) * 3;
        ringPos.push(x, y, z);
      }
      ringGeo.setAttribute('position', new THREE.Float32BufferAttribute(ringPos, 3));
      const ringMat = new THREE.PointsMaterial({
        size: 0.2,
        color: 0xff8899,
        map: particleTexture,
        blending: THREE.AdditiveBlending,
        transparent: true,
        opacity: 0.35,
        depthWrite: false,
        sizeAttenuation: true
      });
      const ringHearts = new THREE.Points(ringGeo, ringMat);
      scene.add(ringHearts);

      // ---- animation variables ----
      let clock = new THREE.Clock();

      function animate() {
        const delta = clock.getDelta();
        const elapsed = performance.now() / 1000;

        // rotate whole scene slowly
        heartParticles.rotation.y = Math.sin(elapsed * 0.08) * 0.3;
        heartParticles.rotation.x = Math.sin(elapsed * 0.05) * 0.15;
        heartParticles.rotation.z = Math.sin(elapsed * 0.03) * 0.1;

        extraHearts.rotation.y = elapsed * 0.04;
        extraHearts.rotation.x = Math.sin(elapsed * 0.02) * 0.2;

        ringHearts.rotation.y = elapsed * 0.06;
        ringHearts.rotation.x = Math.sin(elapsed * 0.04) * 0.3;
        ringHearts.rotation.z = Math.sin(elapsed * 0.02) * 0.2;

        // pulsating scale
        const pulse = 1 + Math.sin(elapsed * 1.2) * 0.02;
        heartParticles.scale.set(pulse, pulse, pulse);

        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      animate();

      // ---- resize handler ----
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      // ---- Audio: background song (apologies theme) ----
      let audio = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
      audio.loop = true;
      audio.volume = 0.4;

      // ---- UI controls ----
      const playBtn = document.getElementById('playPauseBtn');
      const playIcon = document.getElementById('playIcon');
      const playLabel = document.getElementById('playLabel');
      const restartBtn = document.getElementById('restartBtn');

      let isPlaying = false;

      function togglePlay() {
        if (isPlaying) {
          audio.pause();
          playIcon.className = 'fas fa-play';
          playLabel.textContent = 'Play song';
        } else {
          audio.play().catch(e => console.log('autoplay blocked, click again'));
          playIcon.className = 'fas fa-pause';
          playLabel.textContent = 'Pause';
        }
        isPlaying = !isPlaying;
      }

      playBtn.addEventListener('click', togglePlay);

      restartBtn.addEventListener('click', () => {
        audio.currentTime = 0;
        if (!isPlaying) {
          audio.play().catch(() => {});
          playIcon.className = 'fas fa-pause';
          playLabel.textContent = 'Pause';
          isPlaying = true;
        }
      });

      // auto start attempt (if user interaction not required, but we let user click)
      // we set a small timeout to show that audio is ready
      console.log('Click "Play song" to hear the melody.');

      // ---- extra: click on card to toggle? no, we keep buttons ----
    })();
  </script>

  <!-- small fallback for audio (if needed) -->
  <noscript><p style="color:white;">Please enable JavaScript for the full experience.</p></noscript>
</body>
</html>
